  const [switchCount,setSwitchCount] = useState(0);
  const [sheetVisible,setSheetVisible] = useState(false);
  const [sheetTotal,setSheetTotal] = useState(0);
  const [snackbar,setSnackbar] = useState(false);
  const [settled,setSettled] = useState(false);
  const [dismissed,setDismissed] = useState(false);
  const [tabSwapped,setTabSwapped] = useState(false); // for plan B: tabs swapped after settle
  const [logs,setLogs] = useState([]);

  const log=(msg)=>{
    const t=new Date().toLocaleTimeString("en",{hour12:false,hour:"2-digit",minute:"2-digit",second:"2-digit"});
    setLogs(p=>[...p.slice(-12),{t,msg}]);
  };
  const onTab=(id)=>{
    if(id==="swap"||id==="market"||id==="pay"){setTab(id);return;}
    if(id==="wallet"&&tab!=="wallet"&&!settled){
      if(tab==="home"){
        const n=switchCount+1; setSwitchCount(n);
        log(`🔄 首页→钱包 切换计数 (${n}/3)`);
        if(n>=3&&!dismissed&&sheetTotal<2){
          setTimeout(()=>{setSheetVisible(true);setSheetTotal(p=>p+1);log("📋 guide_sheet_show 弹窗曝光");},500);
        }
      } else {
        log(`⚠️ ${tab}→钱包 不计入（仅首页→钱包有效）`);
      }
    }
    setTab(id);
  };
  const onConfirm=()=>{
    setSheetVisible(false);setSettled(true);
    log("✅ guide_sheet_confirm 设为钱包页");
    log("💾 guide_setting_complete 写入成功");
    if(plan==="B"){
      log("🔀 tab_layout_changed layout_type: swapped");
      // In plan B, tab swap happens on "next launch" — simulate with short delay after snackbar
      setTimeout(()=>{setTabSwapped(true);log("📐 Tab布局已交换: 钱包→最左 | 首页→动态");},3200);
    }
    setSnackbar(true);setTimeout(()=>{setSnackbar(false);log("🔕 Snackbar 消失");},3000);
  };
  const onDismiss=()=>{
    setSheetVisible(false);setDismissed(true);
    log("❌ guide_sheet_dismiss 保持首页");log("🔒 30天冷却期开始");
  };
  const reset=()=>{
    setTab("home");setSwitchCount(0);setSheetVisible(false);
    setSheetTotal(0);setSnackbar(false);setSettled(false);
    setDismissed(false);setTabSwapped(false);setLogs([]);log("🔁 重置完成");
  };
  const switchPlan=(p)=>{
    setPlan(p);reset();log(`🔄 切换至方案${p}`);
  };

  if(screen==="intro"){
    return React.createElement('div',{style:{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:`radial-gradient(ellipse at 40% 30%,#0A2822 0%,${C.bg} 60%)`,padding:24}},
      React.createElement('div',{style:{width:64,height:64,borderRadius:18,background:`${C.brand}18`,display:"flex",alignItems:"center",justifyContent:"center",marginBottom:24,border:`2px solid ${C.brand}33`}},
        React.createElement('span',{style:{fontSize:32}},'◈')),
      React.createElement('div',{style:{fontSize:24,fontWeight:800,color:C.textW,marginBottom:6}},'Bitget Wallet'),
      React.createElement('div',{style:{fontSize:15,color:C.brand,fontWeight:600,marginBottom:6}},'默认启动页引导提醒策略'),
      React.createElement('div',{style:{fontSize:13,color:C.textM,marginBottom:32}},'PRD v1.1 · 交互原型'),
      React.createElement('div',{style:{display:"flex",gap:8,flexWrap:"wrap",justifyContent:"center",marginBottom:36}},
        ["连续3次切换触发","底部Sheet弹窗","弹窗内完成设置","8秒自动收起","频控≤2次","方案A/B对比"].map(t=>
          React.createElement('span',{key:t,style:{padding:"6px 14px",borderRadius:16,fontSize:12,background:`${C.brand}10`,border:`1px solid ${C.brand}20`,color:C.brand}},t))),
      React.createElement('button',{onClick:()=>{setScreen("demo");log("🚀 开始演示");},style:{padding:"14px 44px",borderRadius:12,background:C.brand,border:"none",fontSize:15,fontWeight:700,color:"#000",cursor:"pointer"}},'开始体验 →'));
  }

  const steps=[
    {done:switchCount>=1,text:"从「首页」点「钱包」Tab"},
    {done:switchCount>=2,text:"回「首页」再切「钱包」"},
    {done:switchCount>=3,text:"第3次首页→钱包触发弹窗"},
    {done:settled||dismissed,text:"在弹窗内做出选择"},
  ];
  if(plan==="B") steps.push({done:tabSwapped,text:"Tab布局交换生效"});

  const stats=[
    {k:"切换次数",v:`${switchCount}/3`,c:switchCount>=3?C.brand:C.textP},
    {k:"弹窗展示",v:`${sheetTotal}/2`,c:sheetTotal>=2?C.red:C.textP},
    {k:"设置",v:settled?"✅ 已设置":dismissed?"❌ 已拒绝":"—",c:settled?C.brand:dismissed?C.red:C.textM},
    {k:"频控",v:dismissed?"冷却30天":settled?"永久停止":"正常",c:C.textS},
  ];
  if(plan==="B") stats.push({k:"Tab布局",v:tabSwapped?"已交换":"默认",c:tabSwapped?C.brand:C.textM});

  return React.createElement('div',{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:`radial-gradient(ellipse at 40% 30%,#0A2822 0%,${C.bg} 60%)`,padding:20,gap:36,flexWrap:"wrap"}},
    // Phone
    React.createElement('div',{style:{width:375,height:812,borderRadius:44,overflow:"hidden",background:C.bg,position:"relative",boxShadow:"0 40px 80px rgba(0,0,0,0.5), 0 0 0 2px #222830, 0 0 0 13px #111419"}},
      React.createElement('div',{style:{height:52,padding:"14px 28px 0",display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:15,fontWeight:600,color:C.textW}},
        React.createElement('span',null,'7:28'),
        React.createElement('div',{style:{position:"absolute",left:"50%",transform:"translateX(-50%)",display:"flex",alignItems:"center",gap:4}},
          React.createElement('span',{style:{fontSize:11,color:C.brand,fontWeight:700}},'▶'),
          React.createElement('span',{style:{fontSize:12,fontWeight:600,color:C.textP}},'Bitget Wallet')),
        React.createElement('div',{style:{display:"flex",gap:4,alignItems:"center"}},
          React.createElement('span',{style:{fontSize:11,color:C.textP}},'||||'),
          React.createElement('div',{style:{width:22,height:10,borderRadius:3,border:`1px solid ${C.textS}`,display:"flex",alignItems:"center",padding:"0 1px"}},
            React.createElement('div',{style:{width:"80%",height:6,borderRadius:1.5,background:C.green}})),
          React.createElement('span',{style:{fontSize:10,color:C.textP,fontWeight:600,marginLeft:1}},'98'))),
      tab==="home"&&React.createElement(HomePage),
      tab==="wallet"&&React.createElement(WalletPage),
      (tab==="market"||tab==="pay"||tab==="swap")&&React.createElement('div',{style:{height:"calc(100% - 132px)",display:"flex",alignItems:"center",justifyContent:"center"}},
        React.createElement('span',{style:{color:C.textM,fontSize:14}},tab==="market"?"行情页面":tab==="pay"?"Pay 页面":"兑换页面")),
      React.createElement(TabBar,{active:tab,onSwitch:onTab,badge:switchCount>=3&&!settled&&!dismissed,swapped:tabSwapped}),
      React.createElement(GuideSheet,{visible:sheetVisible,onConfirm:onConfirm,onDismiss:onDismiss,plan:plan}),
      React.createElement(Snackbar,{visible:snackbar})),
    // Side panel
    React.createElement('div',{style:{maxWidth:320}},
      // Plan switcher
      React.createElement('div',{style:{background:"rgba(255,255,255,0.03)",borderRadius:16,padding:20,marginBottom:16,border:`1px solid ${C.border}`}},
        React.createElement('div',{style:{fontSize:14,fontWeight:700,color:C.textP,marginBottom:12}},'🔀 方案切换'),
        React.createElement('div',{style:{display:"flex",gap:8}},
          React.createElement('button',{onClick:()=>switchPlan("A"),style:{flex:1,padding:"12px 0",borderRadius:10,background:plan==="A"?`${C.brand}22`:"rgba(255,255,255,0.03)",border:`1.5px solid ${plan==="A"?C.brand:"rgba(255,255,255,0.06)"}`,fontSize:13,fontWeight:700,color:plan==="A"?C.brand:C.textM,cursor:"pointer",transition:"all 0.2s"}},
            React.createElement('div',null,'方案一'),
            React.createElement('div',{style:{fontSize:10,fontWeight:400,marginTop:2,opacity:0.7}},'仅弹窗引导')),
          React.createElement('button',{onClick:()=>switchPlan("B"),style:{flex:1,padding:"12px 0",borderRadius:10,background:plan==="B"?`${C.brand}22`:"rgba(255,255,255,0.03)",border:`1.5px solid ${plan==="B"?C.brand:"rgba(255,255,255,0.06)"}`,fontSize:13,fontWeight:700,color:plan==="B"?C.brand:C.textM,cursor:"pointer",transition:"all 0.2s"}},
            React.createElement('div',null,'方案二 ⭐'),
            React.createElement('div',{style:{fontSize:10,fontWeight:400,marginTop:2,opacity:0.7}},'弹窗 + Tab互换'))),
        plan==="B"&&React.createElement('div',{style:{marginTop:12,padding:"10px 12px",borderRadius:10,background:"rgba(0,230,195,0.06)",border:`1px solid ${C.brand}15`,fontSize:11,color:C.textS,lineHeight:1.6}},
          '💡 方案二特点：确认设置后，底部 Tab 栏「钱包」移至最左侧，原「首页」变为「动态」，下次启动生效。')),
      // Guide
      React.createElement('div',{style:{background:"rgba(255,255,255,0.03)",borderRadius:16,padding:20,marginBottom:16,border:`1px solid ${C.border}`}},
        React.createElement('div',{style:{fontSize:14,fontWeight:700,color:C.textP,marginBottom:14}},'📋 操作指引'),
        ...steps.map((s,i)=>
          React.createElement('div',{key:i,style:{fontSize:13,color:s.done?C.brand:C.textM,padding:"5px 0",display:"flex",alignItems:"center",gap:8}},
            React.createElement('span',{style:{width:20,height:20,borderRadius:6,background:s.done?`${C.brand}22`:"rgba(255,255,255,0.04)",display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:11,color:s.done?C.brand:C.textM,border:`1px solid ${s.done?C.brand+"44":"rgba(255,255,255,0.06)"}`}},s.done?"✓":i+1),
            s.text))),
      // Status
      React.createElement('div',{style:{background:"rgba(255,255,255,0.03)",borderRadius:16,padding:20,marginBottom:16,border:`1px solid ${C.border}`}},
        React.createElement('div',{style:{fontSize:14,fontWeight:700,color:C.textP,marginBottom:12}},'📊 状态'),
        React.createElement('div',{style:{display:"grid",gridTemplateColumns:plan==="B"?"1fr 1fr 1fr":"1fr 1fr",gap:8}},
          ...stats.map(s=>
            React.createElement('div',{key:s.k,style:{background:"rgba(255,255,255,0.03)",borderRadius:10,padding:"10px 12px"}},
              React.createElement('div',{style:{fontSize:10,color:C.textM,marginBottom:3}},s.k),
              React.createElement('div',{style:{fontSize:14,fontWeight:700,color:s.c}},s.v))))),
      // Logs
      React.createElement('div',{style:{background:"rgba(255,255,255,0.03)",borderRadius:16,padding:20,marginBottom:16,border:`1px solid ${C.border}`,maxHeight:180,overflow:"auto"}},
        React.createElement('div',{style:{fontSize:14,fontWeight:700,color:C.textP,marginBottom:10}},'🔍 埋点日志'),
        logs.length===0?
          React.createElement('div',{style:{fontSize:12,color:C.textM}},'等待操作...'):
          logs.map((l,i)=>
            React.createElement('div',{key:i,style:{fontSize:11,color:C.textS,padding:"3px 0",fontFamily:"ui-monospace, monospace",borderBottom:`1px solid ${C.border}`}},
              React.createElement('span',{style:{color:C.textM,marginRight:6}},l.t),l.msg))),
      // Reset
      React.createElement('button',{onClick:reset,style:{width:"100%",padding:"12px 0",borderRadius:10,background:"rgba(255,255,255,0.05)",border:`1px solid ${C.border}`,fontSize:13,fontWeight:600,color:C.textS,cursor:"pointer"}},'🔄 重置 Demo'))
  );
}

ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
</body>
</html>
